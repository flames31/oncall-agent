global:
  resolve_timeout: 5m

route:
  group_by:        ['alertname', 'service']
  group_wait:      10s
  group_interval:  10s
  repeat_interval: 1h
  receiver:        oncall-agent

receivers:
  - name: oncall-agent
    webhook_configs:
      - url: "http://agent:8080/webhook"
        send_resolved: false